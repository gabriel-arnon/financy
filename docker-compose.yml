services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: financy_dev
      POSTGRES_PASSWORD: financy_dev_local
      POSTGRES_DB: financy_dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financy_dev -d financy_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      APP_NAME: Financy API
      DEV_USER_ID: 00000000-0000-4000-8000-000000000001
      DATABASE_URL: postgresql://financy_dev:financy_dev_local@postgres:5432/financy_dev
      JWT_SECRET: change-me-local-only
      STORAGE_BACKEND: json
      UPLOAD_STORAGE_PATH: /app/.uploads
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/.uploads
    command: python -m uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_uploads:
  frontend_node_modules:
  frontend_next:
  postgres_data:
